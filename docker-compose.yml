services:
  postgres:
    image: postgres:17
    container_name: atlascore-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: atlascore
      POSTGRES_USER: atlascore
      POSTGRES_PASSWORD: atlascore_password

    ports:
      - "5432:5432"

    volumes:
      - atlascore_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U atlascore -d atlascore"
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  atlascore_postgres_data:
